<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .wrapper {
            max-width: 900px;
            width: 90%;
            background: #fff;
            margin: 30px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header {
            background: #000;
            color: #fff;
            padding: 30px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
        }
        .tab {
            width: 50%;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 18px;
            background: #f3f3f3;
        }
        .tab.active {
            background: #fff;
            border-bottom: 3px solid #f05625;
            font-weight: bold;
        }
        .section {
            padding: 25px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background: #000;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
        }
        .summary-box {
            background: #eee;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .addon-box {
            background: #daffd5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 600px) {
            .header { font-size: 22px; }
            .tab { font-size: 16px; }
            .wrapper { margin: 10px auto; }
        }
    </style>
</head>


<body>

<div class="wrapper">
    <div class="header">ORYGIN AI</div>

    <div class="tabs">
        <div class="tab active" id="tab1">1 Shipping</div>
        <div class="tab" id="tab2">2 Payment</div>
    </div>

    <div class="section" id="page1">
        <label>Full Name *</label>
        <input type="text" placeholder="Enter your name" />

        <label>Phone *</label>
        <input type="text" placeholder="Enter your phone number" />

        <label>Email Address *</label>
        <input type="email" placeholder="Enter your email" />

        <button onclick="nextPage()">Continue & Next →</button>
    </div>

    <div class="section" id="page2" style="display:none;">
        <div class="summary-box">
            <div class="flex-between">
                <strong>Product</strong>
                <strong>Subtotal</strong>
            </div>
            <div class="flex-between" style="margin-top:10px;">
                <span>coach empire × 1</span>
                <span>₹199.00</span>
            </div>
            <div class="flex-between" style="margin-top:10px;">
                <span><strong>Total</strong></span>
                <span><strong>₹199.00</strong></span>
            </div>
        </div>

        <div class="addon-box">
            <input type="checkbox" /> Yes, I'd like a 1 on 1 Growth Call – Just ₹499
        </div>

        <button>Pay Now</button>
    </div>

</div>

<script>
    const t1 = document.getElementById("tab1");
    const t2 = document.getElementById("tab2");
    const p1 = document.getElementById("page1");
    const p2 = document.getElementById("page2");

    function nextPage() {
        p1.style.display = "none";
        p2.style.display = "block";
        t1.classList.remove("active");
        t2.classList.add("active");
    }

    t1.onclick = () => {
        p1.style.display = "block";
        p2.style.display = "none";
        t1.classList.add("active");
        t2.classList.remove("active");
    }

    t2.onclick = nextPage;
</script>

</body>
</html>
