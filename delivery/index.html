<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Asendox</title>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <!-- Subtle gradient background shapes -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    
    <!-- Main container -->
    <main class="container">
        <!-- Success icon with animation -->
        <div class="icon-wrapper">
            <svg class="success-icon" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
                <circle class="success-circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="success-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>

        <!-- Main heading -->
        <h1 class="heading fade-in">Thank you for your purchase</h1>
        
        <!-- Subheading -->
        <p class="subheading fade-in">Here is your product</p>
        
        <!-- Divider -->
        <div class="divider fade-in"></div>
        
        <!-- Action buttons -->
        <div class="button-container fade-in">
            <a href="https://ai-sales-os.ai/" 
               target="_blank" 
               rel="noopener noreferrer"
               class="product-button">
                View Product
            </a>
            <a href="https://cal.com/.ai/strategy-call" 
               target="_blank" 
               rel="noopener noreferrer"
               class="call-button"
               id="bookCallButton">
                Book a Call
            </a>
        </div>

        <!-- Optional: Status message for API submission -->
        <div id="status-message" class="status-message"></div>
    </main>

    <a href="https://wa.me/918448799495?text=Hi%2C%20I%20need%20help%20with%20AI%20bundle" 
       target="_blank" 
       rel="noopener noreferrer"
       class="contact-button"
       aria-label="Contact us on WhatsApp">
        Contact Us
    </a>

    <script src="script.js"></script>
</body>
</html>
